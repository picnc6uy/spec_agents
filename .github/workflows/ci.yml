name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Opt in to Node 24 ahead of GitHub's 2026-06-02 forced switch.
# actions/checkout@v4 + actions/setup-python@v5 are Node-20-based;
# this env var tells the runner to execute them on Node 24 instead.
# Documented at:
#   github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# (ci-node-migration-01 / S1.E2 of dev-plan-30d-revision-01)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev tools
        # Consumers install spec-agents from the git URL pinned in their
        # pyproject.toml (XR-005). The kernel itself installs editable
        # from source. ruff/pyright/detect-secrets are pinned to match
        # what the .pre-commit-config.yaml uses, so CI and pre-commit
        # don't drift on formatting/type rules.
        run: pip install -e ".[dev]" "ruff==0.8.4" "pyright==1.1.360" "detect-secrets==1.5.0"

      - name: Lint (ruff)
        run: |
          ruff check .
          ruff format --check .

      - name: Type-check (pyright strict)
        run: pyright

      - name: Detect secrets (XR-001)
        run: |
          # Compare current scan against the committed baseline; exit non-zero
          # if any tracked file has a new high-entropy secret not in the baseline.
          git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline

      - name: Tests
        run: pytest -q
